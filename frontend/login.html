<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SANTMS — Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
:root {
  --primary: #6c63ff;
  --primary-dark: #5a52d5;
  --accent: #00d2d3;
  --danger: #ff6b6b;
  --bg-dark: #0a0e1a;
  --bg-card: rgba(255,255,255,0.05);
  --text: #e8eaf6;
  --text-muted: #9e9eb8;
  --border: rgba(255,255,255,0.1);
  --glass: rgba(255,255,255,0.07);
  --glow: 0 0 40px rgba(108,99,255,0.3);
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  min-height:100vh;
  background: var(--bg-dark);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

/* Animated background */
.bg-animated {
  position:fixed;inset:0;z-index:0;
  background: radial-gradient(ellipse at 20% 50%, rgba(108,99,255,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(0,210,211,0.1) 0%, transparent 50%),
              radial-gradient(ellipse at 60% 80%, rgba(255,107,107,0.08) 0%, transparent 40%),
              linear-gradient(135deg, #0a0e1a 0%, #0d1128 50%, #0a0e1a 100%);
}
.particles {position:fixed;inset:0;z-index:0;overflow:hidden;}
.particle {
  position:absolute;border-radius:50%;
  animation:float linear infinite;opacity:0.4;
}
@keyframes float {
  0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
  10%{opacity:0.4;}
  90%{opacity:0.4;}
  100%{transform:translateY(-100px) rotate(720deg);opacity:0;}
}
.grid-lines {
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(108,99,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(108,99,255,0.05) 1px, transparent 1px);
  background-size:60px 60px;
}

/* Login container */
.login-wrapper {
  position:relative;z-index:10;
  width:100%;max-width:460px;padding:1rem;
}
.login-card {
  background:rgba(13,17,40,0.85);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:24px;
  padding:2.5rem;
  box-shadow: 0 25px 60px rgba(0,0,0,0.5), var(--glow);
  animation:slideUp .6s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* Logo */
.logo-area {text-align:center;margin-bottom:2rem;}
.logo-icon {
  width:72px;height:72px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  border-radius:20px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:2rem;color:#fff;
  box-shadow:0 8px 30px rgba(108,99,255,0.4);
  margin-bottom:1rem;
  animation:pulse 3s ease infinite;
}
@keyframes pulse{0%,100%{box-shadow:0 8px 30px rgba(108,99,255,0.4);}50%{box-shadow:0 8px 50px rgba(108,99,255,0.7);}}
.logo-area h1{font-size:1.6rem;font-weight:800;color:#fff;letter-spacing:-0.5px;}
.logo-area h1 span{color:var(--accent);}
.logo-area p{color:var(--text-muted);font-size:0.82rem;margin-top:4px;}

/* Form */
.form-label{color:var(--text-muted);font-size:0.8rem;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px;}
.input-group-custom{position:relative;margin-bottom:1.2rem;}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.9rem;z-index:2;}
.form-control-custom {
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px 16px 12px 42px;
  color:var(--text);
  font-size:0.92rem;
  transition:all .3s;
  outline:none;
}
.form-control-custom:focus {
  border-color:var(--primary);
  background:rgba(108,99,255,0.08);
  box-shadow:0 0 0 3px rgba(108,99,255,0.15);
}
.form-control-custom::placeholder{color:rgba(158,158,184,0.5);}
.toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);cursor:pointer;font-size:0.9rem;z-index:2;}
.toggle-pw:hover{color:var(--primary);}

/* Remember / forgot */
.form-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem;}
.remember-label{display:flex;align-items:center;gap:8px;color:var(--text-muted);font-size:0.83rem;cursor:pointer;}
.remember-label input[type=checkbox]{
  width:16px;height:16px;accent-color:var(--primary);cursor:pointer;
}
.forgot-link{color:var(--primary);font-size:0.83rem;text-decoration:none;transition:color .2s;}
.forgot-link:hover{color:var(--accent);}

/* Submit button */
.btn-login {
  width:100%;padding:13px;
  background:linear-gradient(135deg,var(--primary),var(--primary-dark));
  border:none;border-radius:12px;
  color:#fff;font-size:1rem;font-weight:700;letter-spacing:0.3px;
  cursor:pointer;transition:all .3s;
  position:relative;overflow:hidden;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 35px rgba(108,99,255,0.5);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.7;cursor:not-allowed;transform:none;}
.btn-login .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Divider */
.divider{text-align:center;position:relative;margin:1.2rem 0;}
.divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
.divider span{position:relative;background:#0d1128;padding:0 12px;color:var(--text-muted);font-size:0.78rem;}

/* Demo accounts */
.demo-accounts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1rem;}
.demo-btn{
  background:var(--glass);border:1px solid var(--border);border-radius:10px;
  padding:8px 10px;text-align:center;cursor:pointer;transition:all .2s;
  color:var(--text-muted);font-size:0.75rem;
}
.demo-btn:hover{background:rgba(108,99,255,0.15);border-color:var(--primary);color:var(--text);}
.demo-btn strong{display:block;color:var(--text);font-size:0.82rem;margin-bottom:2px;}

/* Alert */
.alert-error{
  background:rgba(255,107,107,0.12);border:1px solid rgba(255,107,107,0.3);
  border-radius:10px;padding:10px 14px;color:#ff8a8a;font-size:0.83rem;
  margin-bottom:1rem;display:flex;align-items:center;gap:8px;
}

/* Status bar */
.status-bar{
  display:flex;justify-content:center;gap:20px;
  margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid var(--border);
}
.status-item{display:flex;align-items:center;gap:6px;font-size:0.72rem;color:var(--text-muted);}
.status-dot{width:7px;height:7px;border-radius:50%;background:#2ed573;box-shadow:0 0 6px #2ed573;animation:blink 2s ease infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;};}
</style>
</head>
<body>
<div class="bg-animated"></div>
<div class="grid-lines"></div>
<div class="particles" id="particles"></div>

<div class="login-wrapper">
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon"><i class="fas fa-network-wired"></i></div>
      <h1>SANT<span>MS</span></h1>
      <p>Secure Automatic Network Topology &amp; Management System</p>
    </div>

    <div id="alertBox" class="alert-error" style="display:none;">
      <i class="fas fa-exclamation-triangle"></i>
      <span id="alertMsg"></span>
    </div>

    <div class="input-group-custom">
      <i class="fas fa-user input-icon"></i>
      <input id="username" class="form-control-custom" type="text" placeholder="Username or Email" autocomplete="username"/>
    </div>
    <div class="input-group-custom" style="position:relative;">
      <i class="fas fa-lock input-icon"></i>
      <input id="password" class="form-control-custom" type="password" placeholder="Password" autocomplete="current-password"/>
      <i class="fas fa-eye toggle-pw" id="togglePw"></i>
    </div>

    <div class="form-options">
      <label class="remember-label">
        <input type="checkbox" id="rememberMe"/> Remember me
      </label>
      <a href="#" class="forgot-link" onclick="forgotPassword()">Forgot password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="loginText"><i class="fas fa-sign-in-alt me-2"></i>Sign In</span>
      <div class="spinner" id="loginSpinner"></div>
    </button>

    <div class="divider"><span>Quick Demo Access</span></div>

    <div class="demo-accounts">
      <div class="demo-btn" onclick="fillDemo('superadmin','Admin@1234')">
        <strong><i class="fas fa-crown me-1"></i>Super Admin</strong>superadmin
      </div>
      <div class="demo-btn" onclick="fillDemo('netadmin','Admin@1234')">
        <strong><i class="fas fa-server me-1"></i>Net Admin</strong>netadmin
      </div>
      <div class="demo-btn" onclick="fillDemo('secanalyst','Admin@1234')">
        <strong><i class="fas fa-shield-alt me-1"></i>Security</strong>secanalyst
      </div>
      <div class="demo-btn" onclick="fillDemo('readonly','Admin@1234')">
        <strong><i class="fas fa-eye me-1"></i>Read Only</strong>readonly
      </div>
    </div>

    <div class="status-bar">
      <div class="status-item"><div class="status-dot"></div>System Online</div>
      <div class="status-item"><i class="fas fa-lock" style="color:#2ed573;font-size:9px;"></i>JWT Secured</div>
      <div class="status-item"><i class="fas fa-database" style="color:#54a0ff;font-size:9px;"></i>PostgreSQL</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080';

// Generate floating particles
(function(){
  const c = document.getElementById('particles');
  for(let i=0;i<25;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 2+Math.random()*4;
    const colors = ['rgba(108,99,255,0.6)','rgba(0,210,211,0.5)','rgba(255,255,255,0.3)'];
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${8+Math.random()*12}s;
      animation-delay:${Math.random()*10}s;`;
    c.appendChild(p);
  }
})();

// Toggle password
document.getElementById('togglePw').addEventListener('click',function(){
  const inp = document.getElementById('password');
  if(inp.type==='password'){inp.type='text';this.className='fas fa-eye-slash toggle-pw';}
  else{inp.type='password';this.className='fas fa-eye toggle-pw';}
});

// Enter key
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('username').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('password').focus();});
document.addEventListener("DOMContentLoaded", () => {

    const savedTheme = localStorage.getItem("theme") || "dark";

    if(savedTheme === "light"){
        document.body.classList.add("light-theme");

        const icon = document.querySelector(".header-btn .fa-moon");

        if(icon){
            icon.classList.remove("fa-moon");
            icon.classList.add("fa-sun");
        }
    }

});
function fillDemo(u,p){
  document.getElementById('username').value=u;
  document.getElementById('password').value=p;
  document.getElementById('alertBox').style.display='none';
}

function showError(msg){
  document.getElementById('alertMsg').textContent=msg;
  document.getElementById('alertBox').style.display='flex';
}

function setLoading(v){
  const btn=document.getElementById('loginBtn');
  const txt=document.getElementById('loginText');
  const spn=document.getElementById('loginSpinner');
  btn.disabled=v;
  txt.style.display=v?'none':'block';
  spn.style.display=v?'block':'none';
}

async function doLogin(){
  const user=document.getElementById('username').value.trim();
  const pass=document.getElementById('password').value.trim();
  const rem=document.getElementById('rememberMe').checked;
  if(!user||!pass){showError('Please enter username and password.');return;}

  setLoading(true);
  document.getElementById('alertBox').style.display='none';

  try {
    const res = await fetch(`${API}/api/auth/login`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({usernameOrEmail:user,password:pass,rememberMe:rem})
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.message||'Login failed');

    localStorage.setItem('santms_token', data.accessToken);
    localStorage.setItem('santms_refresh', data.refreshToken);
    localStorage.setItem('santms_user', JSON.stringify(data.user));
    localStorage.setItem('santms_org', data.user.organizationId||1);

    // Redirect to dashboard
    window.location.href='pages/dashboard.html';
  } catch(e){
    showError(e.message||'Connection failed. Is the backend running?');
  } finally {
    setLoading(false);
  }
}

async function forgotPassword(){
  const email=prompt('Enter your registered email:');
  if(!email)return;
  try{
    const r=await fetch(`${API}/api/auth/forgot-password`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const d=await r.json();
    alert(d.message||'Reset link sent!');
  }catch(e){alert('Error: '+e.message);}
}

// Check if already logged in
if(localStorage.getItem('santms_token')){
  window.location.href='pages/dashboard.html';
}
</script>
</body>
</html>
