# ============================================================
# SANTMS - Application Configuration
# ============================================================

# Server
server.port=8080
server.servlet.context-path=/
spring.application.name=SANTMS

# ============================================================
# DATABASE - PostgreSQL
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ============================================================
# JWT SECURITY
# ============================================================
app.jwt.secret=SANTMSSecretKey2024SuperSecureKeyForNetworkManagementSystem256BitLong
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000
app.jwt.issuer=SANTMS-Enterprise

# ============================================================
# MAIL (SMTP)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.email.from=noreply@santms.com
app.email.from-name=SANTMS Network Management

# ============================================================
# CORS
# ============================================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:8080

# ============================================================
# RATE LIMITING
# ============================================================
app.rate-limit.requests-per-minute=100

# ============================================================
# FILE UPLOAD
# ============================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# ============================================================
# LOGGING
# ============================================================
logging.level.com.santms=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.file.name=logs/santms.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ============================================================
# ACTUATOR
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# CACHE
# ============================================================
spring.cache.type=simple

# ============================================================
# APP CONFIG
# ============================================================
app.name=SANTMS
app.version=1.0.0
app.network.scan-interval=60000
app.network.discovery-timeout=5000
app.backup.path=./backups
app.otp.expiry-minutes=10
